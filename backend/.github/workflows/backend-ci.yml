name: Backend CI

# Esto le dice a GitHub cuándo ejecutar este flujo
on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**' # SOLO se ejecuta si hay cambios en la carpeta backend
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    # 1. Copia tu código al servidor de GitHub
    - uses: actions/checkout@v4
    
    # 2. Prepara Python (usamos 3.11 como estándar moderno)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Acelera las descargas futuras
        
    # 3. Instala las dependencias de tu archivo requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
    # 4. Ejecuta tus pruebas con pytest
    - name: Run Pytest
      run: |
        cd backend
        pytest test/
