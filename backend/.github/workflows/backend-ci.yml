name: Backend CI

# Se ejecuta en cada push o pull request a la rama main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    # 1. Copia tu código
    - uses: actions/checkout@v4
    
    # 2. Configura Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    # 3. Instala las dependencias desde la raíz
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    # 4. Ejecuta las pruebas (Pytest leerá automáticamente el pytest.ini de la raíz)
    - name: Run Pytest
      env:
        # Variables de entorno de prueba para evitar que falle si faltan
        DATABASE_URL: sqlite:///./test.db
        SECRET_KEY: test_secret_key
      run: pytest
